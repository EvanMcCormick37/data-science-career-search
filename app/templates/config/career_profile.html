{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto py-8 px-4">
  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-800">Career Profile</h1>
    <p class="text-sm text-gray-500 mt-0.5">
      <a href="/config" class="text-blue-600 hover:underline">&larr; Config</a>
    </p>
  </div>

  <form method="POST" action="/config/profile" class="flex flex-col gap-4">
    <div class="border border-gray-200 rounded-xl overflow-hidden bg-white">
      <textarea
        name="profile_text"
        rows="30"
        class="w-full text-xs font-mono p-4 resize-y focus:outline-none leading-relaxed"
        spellcheck="false"
      >{{ profile_text }}</textarea>
    </div>

    <div class="flex justify-end">
      <button
        type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded transition-colors"
      >
        Save Profile
      </button>
    </div>
  </form>
</div>
{% endblock %}
