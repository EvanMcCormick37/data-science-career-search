{% extends "base.html" %}
{% block content %}
<div class="flex h-[calc(100vh-3.5rem)]">

  <!-- ── Filter Sidebar ────────────────────────────────────── -->
  <aside class="w-64 flex-shrink-0 bg-white border-r border-gray-200 overflow-y-auto p-4 flex flex-col gap-4">
    <h2 class="font-semibold text-gray-700 text-sm uppercase tracking-wide">Filters</h2>

    <form method="GET" action="{{ action }}" class="flex flex-col gap-4">

      <!-- Sort -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Sort by</label>
        <select name="sort" class="w-full text-sm border border-gray-300 rounded px-2 py-1">
          <option value="improvement_priority" {% if sort == 'improvement_priority' %}selected{% endif %}>Improvement Priority</option>
          <option value="avg_salary"           {% if sort == 'avg_salary'           %}selected{% endif %}>Avg Salary</option>
          <option value="avg_fit"              {% if sort == 'avg_fit'              %}selected{% endif %}>Avg Fit</option>
          <option value="avg_qual"             {% if sort == 'avg_qual'             %}selected{% endif %}>Avg Qual</option>
          <option value="raw_count"            {% if sort == 'raw_count'            %}selected{% endif %}>Count</option>
          <option value="actionable_count"     {% if sort == 'actionable_count'     %}selected{% endif %}>Actionable Count</option>
        </select>
      </div>

      <!-- Listing mode -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Listings</label>
        <div class="flex flex-col gap-1">
          <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
            <input type="radio" name="listing_mode" value="active"
                   {% if listing_mode == 'active' %}checked{% endif %} />
            Active Only
          </label>
          <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
            <input type="radio" name="listing_mode" value="good"
                   {% if listing_mode == 'good' %}checked{% endif %} />
            All Good
          </label>
        </div>
      </div>

      <!-- Name search -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Name</label>
        <input type="text" name="name" value="{{ name }}"
               class="w-full text-sm border border-gray-300 rounded px-2 py-1"
               placeholder="Search {{ label | lower }}…" />
      </div>

      <!-- Date listed range -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Listed from</label>
        <input type="date" name="date_listed_from" value="{{ date_listed_from }}"
               class="w-full text-sm border border-gray-300 rounded px-2 py-1" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Listed to</label>
        <input type="date" name="date_listed_to" value="{{ date_listed_to }}"
               class="w-full text-sm border border-gray-300 rounded px-2 py-1" />
      </div>

      <!-- Show unverified candidates -->
      <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
        <input type="checkbox" name="show_candidates" value="true"
               {% if show_candidates %}checked{% endif %} />
        Show unverified
      </label>

      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-md transition-colors">
        Apply
      </button>
    </form>
  </aside>

  <!-- ── Table ──────────────────────────────────────────────── -->
  <main class="flex-1 overflow-auto min-w-0">
    {% include "keywords/_table.html" %}
  </main>

</div>
{% endblock %}
